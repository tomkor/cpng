apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-main-restore-test
  namespace: database
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  instances: 1
  bootstrap:
    recovery:
      source: source
  externalClusters:
    - name: source
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: minio-store
          serverName: pg-main
  storage:
    storageClass: longhorn-single
    size: 30Gi
  walStorage:
    storageClass: longhorn-single
    size: 10Gi
