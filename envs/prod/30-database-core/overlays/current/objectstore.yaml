apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: minio-store
  namespace: database
spec:
  configuration:
    destinationPath: s3://postgres-backups/
    endpointURL: http://minio.minio.svc.cluster.local:9000
    s3Credentials:
      accessKeyId:
        name: minio-cnpg-creds
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: minio-cnpg-creds
        key: ACCESS_SECRET_KEY
    wal:
      compression: gzip
    data:
      compression: gzip
    retentionPolicy: "30d"
